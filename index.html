<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SPA: restaura a rota original após o redirect do 404.html (GitHub Pages) -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          if (redirect !== location.href) {
            history.replaceState(null, '', redirect);
          }
        }
      })();
    </script>

    <!-- SEO Meta Tags -->
    <title>
      Hatsune Miku Fan Hub - O Melhor Site sobre Miku e Vocaloid em Português
    </title>
    <meta
      name="description"
      content="O hub definitivo para fãs de Hatsune Miku no Brasil! Descubra tudo sobre Vocaloid, música, arte, tecnologia e cultura. Comunidade brasileira oficial de Miku."
    />
    <meta
      name="keywords"
      content="Hatsune Miku, Vocaloid, Miku Brasil, música virtual, síntese vocal, anime, manga, tecnologia musical, comunidade Miku, fanart, covers, Crypton Future Media"
    />
    <meta name="author" content="Hatsune Miku Fan Hub Brasil" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="pt-BR" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://miku.com.br/" />
    <meta
      property="og:title"
      content="Hatsune Miku Fan Hub - A Casa dos Fãs de Miku no Brasil"
    />
    <meta
      property="og:description"
      content="Explore o mundo de Hatsune Miku: música, arte, tecnologia e comunidade. O maior hub brasileiro dedicado à diva virtual mais famosa do mundo."
    />
    <meta property="og:image" content="/miku-a.png" />
    <meta
      property="og:image:alt"
      content="Hatsune Miku - Personagem Vocaloid"
    />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Hatsune Miku Fan Hub Brasil" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://miku.com.br/" />
    <meta
      name="twitter:title"
      content="Hatsune Miku Fan Hub - A Casa dos Fãs de Miku no Brasil"
    />
    <meta
      name="twitter:description"
      content="Explore o mundo de Hatsune Miku: música, arte, tecnologia e comunidade. O maior hub brasileiro dedicado à diva virtual mais famosa do mundo."
    />
    <meta name="twitter:image" content="/miku-a.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://miku.com.br/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/miku-a.png" />
    <link rel="apple-touch-icon" href="/miku-a.png" />

    <!-- Structured Data Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Hatsune Miku Fan Hub Brasil",
        "description": "O hub definitivo para fãs de Hatsune Miku no Brasil. Descubra tudo sobre Vocaloid, música, arte, tecnologia e cultura.",
        "url": "https://miku.com.br/",
        "sameAs": [
          "https://www.youtube.com/channel/mikufanhub",
          "https://twitter.com/mikufanhub"
        ],
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://miku.com.br/busca?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400;500;700;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-inter">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
