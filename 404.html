<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Hatsune Miku Fan Hub</title>
    <script>
      // SPA fallback para GitHub Pages: guarda a URL original e redireciona
      // para a raiz. O script no index.html restaura a rota via replaceState.
      sessionStorage.setItem('redirect', location.href);
      location.replace('/');
    </script>
  </head>
  <body>
    <noscript>
      <meta http-equiv="refresh" content="0; url=/" />
    </noscript>
  </body>
</html>
